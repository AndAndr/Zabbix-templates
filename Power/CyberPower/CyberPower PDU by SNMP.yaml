zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 3dcd5bbe90534f9e8eb5c2d53756af63
      name: Templates/Power
  templates:
    - uuid: 12b9beec9fae4b7a94f1b84836055d35
      template: 'CyberPower PDU by SNMP'
      name: 'CyberPower PDU by SNMP'
      description: |
        https://github.com/AndAndr/Zabbix-templates
        Шаблон мониторинга PDU CyberPower ePDU2.
        Тестировался на модели PDU83401.
        Конфигурация Daisy Chain в шаблоне не поддерживается.
        Расположение сенсора климата захардкодил.
      groups:
        - name: Templates/Power
      items:
        - uuid: 9d12c4b6f808412b8f5d1d2eeefea926
          name: DewPoint
          type: CALCULATED
          key: DewPoint
          units: '`C'
          params: '(237.7*(((17.27*last(//envir2Temperature))/(237.7+last(//envir2Temperature)))+log(last(//envir2Humidity)/100)))/(17.27-(((17.27*last(//envir2Temperature))/(237.7+last(//envir2Temperature)))+log(last(//envir2Humidity)/100)))'
          description: 'Рекомендуемый диапазон точки росы в ЦОД: 5,5–15 `C'
          tags:
            - tag: component
              value: health
          triggers:
            - uuid: f470e8920ee94681a823af51aec31369
              expression: 'last(/CyberPower PDU by SNMP/DewPoint)>{$DEWPOINT.MAX}'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/CyberPower PDU by SNMP/DewPoint)<"{$DEWPOINT.MAX}-1"'
              name: 'Высокая температура точки росы'
              opdata: 'Current state: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: 'Рекомендуемый диапазон точки росы в ЦОД: 5,5–15 `C'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: health
            - uuid: 8657f6369ab04be68c5967a3fb7f4cea
              expression: 'last(/CyberPower PDU by SNMP/DewPoint)<{$DEWPOINT.MIN}'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/CyberPower PDU by SNMP/DewPoint)>"{$DEWPOINT.MIN}+1"'
              name: 'Низкая температура точки росы'
              opdata: 'Current state: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: 'Рекомендуемый диапазон точки росы в ЦОД: 5,5–15 `C'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: health
        - uuid: 4908ec4fc2304d92b65ff2d2583205d3
          name: envir2Humidity
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.3808.1.1.8.3.2.1.3.1
          key: envir2Humidity
          value_type: FLOAT
          units: '%'
          description: Влажность
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: health
        - uuid: 8316f12a4c614194b9f77ea8e582be1b
          name: envir2Temperature
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.3808.1.1.8.2.3.1.3.1
          key: envir2Temperature
          value_type: FLOAT
          units: C`
          description: Температура
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: health
          triggers:
            - uuid: 6af47ecac0494bf2806170bc198c5c9a
              expression: 'last(/CyberPower PDU by SNMP/envir2Temperature)>{$TEMPERATURE.MAX}'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/CyberPower PDU by SNMP/envir2Temperature)<{$TEMPERATURE.MAX}-{$TEMPERATURE.HYSTERESIS}'
              name: 'Высокая температура PDU'
              opdata: 'Current state: {ITEM.LASTVALUE1}'
              priority: WARNING
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: health
            - uuid: 4ceaeb34ac544173abaa63f99574cd52
              expression: 'last(/CyberPower PDU by SNMP/envir2Temperature)<{$TEMPERATURE.MIN}'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/CyberPower PDU by SNMP/envir2Temperature)>{$TEMPERATURE.MIN}+{$TEMPERATURE.HYSTERESIS}'
              name: 'Низкая температура PDU'
              opdata: 'Current state: {ITEM.LASTVALUE1}'
              priority: WARNING
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: health
        - uuid: f2f1e5aef2e5493197bead0b790d45b4
          name: ePDU2DeviceConfigPowerLowLoadThreshold
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.3808.1.1.6.3.2.1.13.1
          key: ePDU2DeviceConfigPowerLowLoadThreshold
          delay: 10m
          units: Вт
          description: 'Определённая пользователем уставка низкой загрузки PDU в Ваттах.'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          tags:
            - tag: component
              value: config
        - uuid: 601af0acad5a48e2bffe098904854ba0
          name: ePDU2DeviceConfigPowerNearOverloadThreshold
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.3808.1.1.6.3.2.1.14.1
          key: ePDU2DeviceConfigPowerNearOverloadThreshold
          delay: 10m
          units: Вт
          description: 'Определённая пользователем уставка высокой загрузки PDU в Ваттах.'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          tags:
            - tag: component
              value: config
        - uuid: 7bc20c4981d148cb8b3157f11021d8d6
          name: ePDU2DeviceConfigPowerOverloadThreshold
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.3808.1.1.6.3.2.1.15.1
          key: ePDU2DeviceConfigPowerOverloadThreshold
          delay: 10m
          units: Вт
          description: 'Определённая пользователем уставка перегрузки PDU в Ваттах.'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          tags:
            - tag: component
              value: config
        - uuid: 29072063881f4e14a22e640a800e0347
          name: ePDU2DeviceInfoMeteredOutlets
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.3808.1.1.6.3.3.1.7.1
          key: ePDU2DeviceInfoMeteredOutlets
          delay: 10m
          units: Розеток
          description: 'Количество измеряемых розеток PDU.'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          tags:
            - tag: component
              value: inventory
        - uuid: ad929ef8c753489fbc6a42ab051e2981
          name: ePDU2DeviceInfoNumOutlets
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.3808.1.1.6.3.3.1.5.1
          key: ePDU2DeviceInfoNumOutlets
          delay: 10m
          units: Розеток
          description: 'Количество розеток PDU.'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          tags:
            - tag: component
              value: inventory
        - uuid: f1c596be099f40e98760863e5f84208c
          name: ePDU2DeviceInfoSwitchedOutlets
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.3808.1.1.6.3.3.1.6.1
          key: ePDU2DeviceInfoSwitchedOutlets
          delay: 10m
          units: Розеток
          description: 'Количество управляемых розеток PDU.'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          tags:
            - tag: component
              value: inventory
        - uuid: 209d8a2858124649bdcfe83a78b3ce04
          name: ePDU2DeviceStatusApparentPower
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.3808.1.1.6.3.4.1.15.1
          key: ePDU2DeviceStatusApparentPower
          units: ВА
          description: 'Полная электрическая мощность нагрузки PDU (ВА).'
          tags:
            - tag: component
              value: power
        - uuid: 3ce2766d0ad54e26938030c5f1a469d0
          name: ePDU2DeviceStatusLoadState
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.3808.1.1.6.3.4.1.4.1
          key: ePDU2DeviceStatusLoadState
          description: |
            1-noLoadAlarm (Норма)
            2-underCurrentAlarm
            3-nearOverCurrentAlarm
            4-overCurrentAlarm
          valuemap:
            name: ePDU2DeviceStatusLoadState
          tags:
            - tag: component
              value: health
          triggers:
            - uuid: 0399ecb465474faf91df2309d2a57f38
              expression: 'last(/CyberPower PDU by SNMP/ePDU2DeviceStatusLoadState)=3'
              name: 'PDU близок к перегрузке по току'
              opdata: 'Current state: {ITEM.LASTVALUE1}'
              priority: AVERAGE
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: notice
            - uuid: ab1a94a2413a4c30b21d29747b67ad9b
              expression: 'last(/CyberPower PDU by SNMP/ePDU2DeviceStatusLoadState)=2'
              name: 'PDU недостаточно нагружен по току'
              opdata: 'Current state: {ITEM.LASTVALUE1}'
              priority: WARNING
              tags:
                - tag: scope
                  value: notice
            - uuid: 1e4d5127080048fcb30c2490e325a029
              expression: 'last(/CyberPower PDU by SNMP/ePDU2DeviceStatusLoadState)=4'
              name: 'PDU перегружен по току'
              opdata: 'Current state: {ITEM.LASTVALUE1}'
              priority: HIGH
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: notice
        - uuid: 4e0a638f1fa24b1690ff6326c7ae3bfe
          name: ePDU2DeviceStatusPowerFactor
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.3808.1.1.6.3.4.1.16.1
          key: ePDU2DeviceStatusPowerFactor
          value_type: FLOAT
          description: 'Коэффициент мощности нагрузки PDU.'
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: power
        - uuid: 0a16e2e977d64e6c9688d419bb25ec55
          name: ePDU2DeviceStatusPowerLoad
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.3808.1.1.6.3.4.1.18.1
          key: ePDU2DeviceStatusPowerLoad
          units: Вт
          description: 'Потребляемая мощность нагрузки PDU (Вт).'
          tags:
            - tag: component
              value: power
        - uuid: e71bb0756b6648238f5d015e545dcf36
          name: ePDU2DeviceStatusPowerPeakLoad
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.3808.1.1.6.3.4.1.19.1
          key: ePDU2DeviceStatusPowerPeakLoad
          units: Вт
          description: 'Пиковая потребляемая мощность нагрузки PDU (Вт).'
          tags:
            - tag: component
              value: power
        - uuid: 4b08534e175b49238d252951e032060e
          name: ePDU2DeviceStatusPowerSupply1Status
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.3808.1.1.6.3.4.1.13.1
          key: ePDU2DeviceStatusPowerSupply1Status
          description: 'Состояние БП1.'
          valuemap:
            name: Status
          tags:
            - tag: component
              value: health
          triggers:
            - uuid: 3a24ce3904e74512a6f7dc9d9bf572ca
              expression: 'last(/CyberPower PDU by SNMP/ePDU2DeviceStatusPowerSupply1Status)<>1'
              name: 'Проверь БП1 PDU'
              priority: AVERAGE
              tags:
                - tag: scope
                  value: availability
        - uuid: afb53964d8f2436f931b27ce82474be4
          name: ePDU2DeviceStatusPowerSupply2Status
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.3808.1.1.6.3.4.1.14.1
          key: ePDU2DeviceStatusPowerSupply2Status
          description: 'Состояние БП2.'
          valuemap:
            name: Status
          tags:
            - tag: component
              value: health
          triggers:
            - uuid: 284e69ec56f946768509b624538ca55a
              expression: 'last(/CyberPower PDU by SNMP/ePDU2DeviceStatusPowerSupply2Status)<>1'
              name: 'Проверь БП2 PDU'
              priority: AVERAGE
              tags:
                - tag: scope
                  value: availability
        - uuid: 410e22ac644d48179b85d13978b83505
          name: ePDU2DeviceStatusPowerSupplyAlarm
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.3808.1.1.6.3.4.1.12.1
          key: ePDU2DeviceStatusPowerSupplyAlarm
          description: 'Состояние источника питания.'
          valuemap:
            name: Status
          tags:
            - tag: component
              value: health
          triggers:
            - uuid: d126cfed7b204b9e892da85d5cba0d18
              expression: 'last(/CyberPower PDU by SNMP/ePDU2DeviceStatusPowerSupplyAlarm)<>1'
              name: 'Проверь источник питания PDU'
              priority: AVERAGE
              tags:
                - tag: scope
                  value: availability
        - uuid: de22700f25074da081564ef576a4f495
          name: ePDU2IdentFirmwareRev
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.3808.1.1.6.2.2.1.7.1
          key: ePDU2IdentFirmwareRev
          delay: 1h
          value_type: TEXT
          trends: '0'
          description: 'The Rack PDU firmware version.'
          inventory_link: SOFTWARE
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: inventory
        - uuid: f1833711085146f7942450f82877e3e0
          name: ePDU2IdentHardwareRev
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.3808.1.1.6.2.2.1.6.1
          key: ePDU2IdentHardwareRev
          delay: 1h
          value_type: TEXT
          trends: '0'
          description: 'The Rack PDU hardware version.'
          inventory_link: HARDWARE
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: inventory
        - uuid: 03e03c433b834f9e898d93f977893753
          name: ePDU2IdentLocation
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.3808.1.1.6.2.2.1.4.1
          key: ePDU2IdentLocation
          delay: 1h
          value_type: TEXT
          trends: '0'
          inventory_link: LOCATION
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: inventory
        - uuid: 8b66b23150354840bae4ec460efab095
          name: ePDU2IdentModelName
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.3808.1.1.6.2.2.1.9.1
          key: ePDU2IdentModelName
          delay: 1h
          value_type: TEXT
          trends: '0'
          description: 'The Rack PDU model number.'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: inventory
        - uuid: 21419ef9bc7a4dbbb06b0228f4dc2037
          name: ePDU2IdentName
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.3808.1.1.6.2.2.1.3.1
          key: ePDU2IdentName
          delay: 1h
          value_type: TEXT
          trends: '0'
          inventory_link: NAME
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: inventory
        - uuid: 34f155ef3a3441aeae4cef00e56439f0
          name: ePDU2IdentSerialNumber
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.3808.1.1.6.2.2.1.10.1
          key: ePDU2IdentSerialNumber
          delay: 1h
          value_type: TEXT
          trends: '0'
          description: 'The Rack PDU serial number.'
          inventory_link: SERIALNO_A
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: inventory
        - uuid: 5c4bd18384154a12b150f42ffea1997b
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          history: 1w
          valuemap:
            name: 'Service state'
          tags:
            - tag: component
              value: network
          triggers:
            - uuid: 884a0703a07049548ca032a48fa89daa
              expression: 'last(/CyberPower PDU by SNMP/icmpping,#3)=0'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/CyberPower PDU by SNMP/icmpping,#3)=1'
              name: 'Тест доступности по протоколу ICMP'
              priority: HIGH
              description: 'Последнее значение: {ITEM.LASTVALUE1}. Последние три попытки вернули тайм-аут. Проверьте подключение устройства.'
              tags:
                - tag: scope
                  value: availability
        - uuid: 9281dd08357a4b4a9d9df64aa0c5b424
          name: 'ICMP loss'
          type: SIMPLE
          key: icmppingloss
          history: 1w
          value_type: FLOAT
          units: '%'
          tags:
            - tag: component
              value: network
          triggers:
            - uuid: 0832a8b6e03647b09be2ff385b0e597d
              expression: 'min(/CyberPower PDU by SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/CyberPower PDU by SNMP/icmppingloss,5m)<100'
              name: 'Высокая потеря пакетов ICMP ping'
              priority: WARNING
              dependencies:
                - name: 'Тест доступности по протоколу ICMP'
                  expression: 'last(/CyberPower PDU by SNMP/icmpping,#3)=0'
                  recovery_expression: 'last(/CyberPower PDU by SNMP/icmpping,#3)=1'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: de0a51bc98c3441fac027d2117936cea
          name: 'ICMP response time'
          type: SIMPLE
          key: icmppingsec
          history: 1w
          value_type: FLOAT
          units: s
          tags:
            - tag: component
              value: network
          triggers:
            - uuid: 04063bb9118d4601ab3fce17cf78f62e
              expression: 'avg(/CyberPower PDU by SNMP/icmppingsec,5m)>{$ICMP_RESPONSE_TIME_WARN}'
              name: 'Высокое время отклика ICMP ping'
              priority: WARNING
              dependencies:
                - name: 'Высокая потеря пакетов ICMP ping'
                  expression: 'min(/CyberPower PDU by SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/CyberPower PDU by SNMP/icmppingloss,5m)<100'
                - name: 'Тест доступности по протоколу ICMP'
                  expression: 'last(/CyberPower PDU by SNMP/icmpping,#3)=0'
                  recovery_expression: 'last(/CyberPower PDU by SNMP/icmpping,#3)=1'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: 982e6f77e68e4c92a72d8d1907e26742
          name: 'SNMP traps (fallback)'
          type: SNMP_TRAP
          key: snmptrap.fallback
          delay: '0'
          value_type: LOG
          trends: '0'
          description: 'The item is used to collect all SNMP traps unmatched by other snmptrap items'
          logtimefmt: 'hh:mm:sszyyyy/MM/dd'
          tags:
            - tag: component
              value: network
        - uuid: d94b67bdab3b4fada407d2fbfc3ec2c8
          name: sysContact
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.2.1.1.4.0
          key: sysContact
          delay: 1h
          value_type: TEXT
          trends: '0'
          description: 'A user-defined string identifying the person to contact of the Rack PDU.'
          inventory_link: CONTACT
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: inventory
        - uuid: da95b2773a3a4f9698d629163276cc21
          name: 'SNMP agent availability'
          type: INTERNAL
          key: 'zabbix[host,snmp,available]'
          description: |
            Availability of SNMP checks on the host. The value of this item corresponds to availability icons in the host list.
            Possible values:
            0 - not available
            1 - available
            2 - unknown
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: ed65169d0e354b088974f4e8db4a4fc0
              expression: 'max(/CyberPower PDU by SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
              name: 'Нет сбора данных SNMP'
              opdata: 'Current state: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: 'SNMP недоступен для опроса. Пожалуйста, проверьте подключение устройства и настройки SNMP.'
              dependencies:
                - name: 'Тест доступности по протоколу ICMP'
                  expression: 'last(/CyberPower PDU by SNMP/icmpping,#3)=0'
                  recovery_expression: 'last(/CyberPower PDU by SNMP/icmpping,#3)=1'
              tags:
                - tag: scope
                  value: availability
      discovery_rules:
        - uuid: b31d42dba86b4f96af44ebc765066542
          name: 'ePDU2 outlet discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#OUTLETINDEX},.1.3.6.1.4.1.3808.1.1.6.6.1.2.1.1,{#OUTLETNAME},.1.3.6.1.4.1.3808.1.1.6.6.1.2.1.4]'
          key: ePDU2Outlet
          delay: 1h
          description: 'Обнаружение розеток.'
          item_prototypes:
            - uuid: 383139469f89419b90342448ca58fa12
