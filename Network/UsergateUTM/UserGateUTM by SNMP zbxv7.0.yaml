        - uuid: d7d42567050747dca2c63b75262c8a18
          name: 'System contact details'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.4.0
          key: 'system.contact[sysContact.0]'
          delay: 1h
          value_type: CHAR
          trends: '0'
          description: |
            MIB: SNMPv2-MIB
            The textual identification of the contact person for this managed node, together with information on how to contact this person.  If no contact information is known, the value is the zero-length string.
          inventory_link: CONTACT
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: 6f44d8c2271d478ca4866f58a54dbb65
          name: 'System description'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.1.0
          key: 'system.descr[sysDescr.0]'
          delay: 1h
          value_type: CHAR
          trends: '0'
          description: |
            MIB: SNMPv2-MIB
            A textual description of the entity. This value should
            include the full name and version identification of the system's hardware type, software operating-system, and
            networking software.
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: c7a10066532e49e2995707c6e4233317
          name: 'System location'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.6.0
          key: 'system.location[sysLocation.0]'
          delay: 1h
          value_type: CHAR
          trends: '0'
          description: |
            MIB: SNMPv2-MIB
            Physical location of the node (e.g., `equipment room`, `3rd floor`). If not provided, the value is a zero-length string.
          inventory_link: LOCATION
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: 6251b012231840f0b42e40ee858dc70b
          name: 'System name'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.5.0
          key: system.name
          delay: 1h
          value_type: CHAR
          trends: '0'
          description: |
            MIB: SNMPv2-MIB
            An administratively-assigned name for this managed node.By convention, this is the node's fully-qualified domain name.  If the name is unknown, the value is the zero-length string.
          inventory_link: NAME
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: 330d3986ad764d1ca6e0a3e7a402510e
              expression: 'last(/UserGateUTM by SNMP/system.name,#1)<>last(/UserGateUTM by SNMP/system.name,#2) and length(last(/UserGateUTM by SNMP/system.name))>0'
              name: 'Системное имя было изменено'
              event_name: 'Системное имя было изменено (новое имя: {ITEM.VALUE})'
              priority: INFO
              description: 'Системное имя было изменено. Подтвердите, чтобы закрыть проблему вручную.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
                - tag: scope
                  value: security
        - uuid: 3ec14d6064d846a3b0a216b122169b99
          name: Uptime
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.3.0
          key: 'system.net.uptime[sysUpTime.0]'
          trends: '0'
          units: uptime
          description: |
            MIB: SNMPv2-MIB
            Time (in hundredths of a second) since the network management portion of the system was last re-initialized.
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
        - uuid: 6d107702e4a6491b903b06cdc3eefaf1
          name: 'System object ID'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.2.0
          key: 'system.objectid[sysObjectID.0]'
          delay: 1h
          value_type: CHAR
          trends: '0'
          description: |
            MIB: SNMPv2-MIB
            The vendor's authoritative identification of the network management subsystem contained in the entity.  This value is allocated within the SMI enterprises subtree (1.3.6.1.4.1) and provides an easy and unambiguous means for determining`what kind of box' is being managed.  For example, if vendor`Flintstones, Inc.' was assigned the subtree1.3.6.1.4.1.4242, it could assign the identifier 1.3.6.1.4.1.4242.1.1 to its `Fred Router'.
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: 08dac57b65b949a0ab416b71cfcd6963
          name: 'The number of active current users'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.45741.2.2.1.1.3.0
          key: usersCounter
          history: 10d
          trends: 60d
          units: Users
          description: 'Количество активных пользователей'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 10m
          tags:
            - tag: component
              value: system
        - uuid: d2dcb432c6ab4da29e38c9572eaf856d
          name: 'vCPU percentage'
          type: CALCULATED
          key: vCPU.percentage
          history: 14d
          value_type: FLOAT
          trends: 60d
          units: '%'
          params: '100*last(//vcpuUsage)/(last(//vcpuCount)*100)'
          description: 'Процент утилизации vCPU'
          tags:
            - tag: component
              value: cpu
            - tag: component
              value: system
          triggers:
            - uuid: e50d4aae621e41c9a7d0b126a8d17333
              expression: 'last(/UserGateUTM by SNMP/vCPU.percentage)>{$VCPU_USED_MAX}'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'avg(/UserGateUTM by SNMP/vCPU.percentage,10m)<{$VCPU_USED_MAX}-10'
              name: 'Высокая загрузка виртуального ЦП'
              priority: AVERAGE
              tags:
                - tag: scope
                  value: performance
        - uuid: 9e576278150b47348b4d76ec5bc136fe
          name: 'vCPU count'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.45741.2.2.1.1.1.0
          key: vcpuCount
          delay: 10m
          history: 2d
          trends: '0'
          units: vCPU
          description: 'Количество vCPU'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: cpu
            - tag: component
              value: system
        - uuid: 53a35cbcd0674ba8b94da465dd11857a
          name: 'vCPU used'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.45741.2.2.1.1.2.0
          key: vcpuUsage
          history: 14d
          trends: 60d
          units: '%'
          description: 'Утилизация vCPU'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 10m
          tags:
            - tag: component
              value: cpu
            - tag: component
              value: system
        - uuid: 76f61711083a41a7bca49870e8ed5361
          name: 'SNMP agent availability'
          type: INTERNAL
          key: 'zabbix[host,snmp,available]'
          delay: 5m
          description: |
            Availability of SNMP checks on the host. The value of this item corresponds to availability icons in the host list.
            Possible values:
            0 - not available
            1 - available
            2 - unknown
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: 5a91902e8fc04a61af9c1aab3e236d22
              expression: 'max(/UserGateUTM by SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
              name: 'Сбор данных SNMP отсутствует'
              opdata: 'Current state: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: 'SNMP недоступен для опроса. Проверьте подключение устройства и настройки SNMP.'
              tags:
                - tag: scope
                  value: availability
      discovery_rules:
        - uuid: 7d245a77b7844773a55bcb0544daaf5e
          name: 'Network Interfaces discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},1.3.6.1.2.1.2.2.1.2,{#IFADMINSTATUS},1.3.6.1.2.1.2.2.1.7]'
          key: ifDescr
          delay: 1h
          filter:
            evaltype: AND
            conditions:
              - macro: '{#IFADMINSTATUS}'
                value: '{$NET.IF.IFADMINSTATUS.MATCHES}'
                formulaid: A
              - macro: '{#IFADMINSTATUS}'
                value: '{$NET.IF.IFADMINSTATUS.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: B
          lifetime: 3d
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: 32cba66569684bfd8e1d68b4adab7151
              name: 'Admin status of interface {#SNMPVALUE}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.7.{#SNMPINDEX}'
              key: 'ifAdminStatus[{#SNMPVALUE}]'
              delay: 1h
              history: 7d
              trends: 60d
              valuemap:
                name: 'SNMP interface status (ifAdminStatus)'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              tags:
                - tag: component
                  value: interface
            - uuid: eae166c7049f4f3eaf4f34ce5d962067
              name: 'Description of interface {#SNMPVALUE}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.2.{#SNMPINDEX}'
              key: 'ifDescr[{#SNMPVALUE}]'
              delay: 1h
              history: 7d
              value_type: CHAR
              trends: '0'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1d
              tags:
                - tag: component
                  value: interface
            - uuid: f7d9130a3ade40b1b5327228953ab18c
              name: 'Inbound errors on interface {#SNMPVALUE}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.14.{#SNMPINDEX}'
              key: 'ifInErrors[{#SNMPVALUE}]'
              delay: 15m
              history: 7d
              trends: 60d
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              tags:
                - tag: component
                  value: interface
              trigger_prototypes:
                - uuid: 5802f11f67624fd5ad160284b417b20e
                  expression: |
                    change(/UserGateUTM by SNMP/ifInErrors[{#SNMPVALUE}])>0 and
                    nodata(/UserGateUTM by SNMP/ifInErrors[{#SNMPVALUE}],1m)=0
                  name: 'Errors on interface {#SNMPVALUE}'
                  priority: WARNING
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: performance
            - uuid: ad2f60bc4fe2470bb96e81330a748522
              name: 'Operational status of interface {#SNMPVALUE}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.8.{#SNMPINDEX}'
              key: 'ifOperStatus[{#SNMPVALUE}]'
              history: 7d
              trends: 60d
              valuemap:
                name: 'SNMP interface status (ifOperStatus)'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              tags:
                - tag: component
                  value: interface
              trigger_prototypes:
                - uuid: a8f9092ee2a24f54a4ac9b7865191355
                  expression: '(last(/UserGateUTM by SNMP/ifOperStatus[{#SNMPVALUE}],#1)<>last(/UserGateUTM by SNMP/ifOperStatus[{#SNMPVALUE}],#2))>0 and nodata(/UserGateUTM by SNMP/ifOperStatus[{#SNMPVALUE}],1m)=0'
                  name: 'Operational status was changed on interface {#SNMPVALUE}'
                  priority: INFO
                  tags:
                    - tag: scope
                      value: notice
            - uuid: c8ddf3ad143343ed83770450f6bc0ef9
              name: 'Outbound errors on interface {#SNMPVALUE}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.20.{#SNMPINDEX}'
              key: 'ifOutErrors[{#SNMPVALUE}]'
              delay: 15m
              history: 7d
              trends: 60d
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              tags:
                - tag: component
                  value: interface
            - uuid: 0f39abf3da78461e875a2a38920c2dec
              name: 'Speed of interface {#SNMPVALUE}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.5.{#SNMPINDEX}'
              key: 'ifSpeed[{#SNMPVALUE}]'
              delay: 1h
              history: 7d
              trends: 60d
              units: bps
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1d
              tags:
                - tag: component
                  value: interface
          trigger_prototypes:
            - uuid: e7826d72df994f7383180ee6b1522540
              expression: 'last(/UserGateUTM by SNMP/ifAdminStatus[{#SNMPVALUE}])=1 and last(/UserGateUTM by SNMP/ifOperStatus[{#SNMPVALUE}])=2'
              name: 'Operational status of interface {#SNMPVALUE} is DOWN!'
              priority: HIGH
              tags:
                - tag: scope
                  value: availability
        - uuid: 35ea17c9db6a41a9830d6a5b4c256052
          name: 'Network Interfaces discovery HC'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},1.3.6.1.2.1.31.1.1.1.1]'
          key: ifName
          delay: 1h
          lifetime: 3d
          enabled_lifetime_type: DISABLE_NEVER
          description: Мрак
          item_prototypes:
            - uuid: 4ca4f8db8218438594f32abe851cce49
              name: 'Incoming traffic on interface {#SNMPVALUE}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.31.1.1.1.6.{#SNMPINDEX}'
              key: 'ifHCInOctets[{#SNMPVALUE}]'
              history: 7d
              trends: 60d
              units: bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: component
                  value: interface
            - uuid: e30aa259c7ff4876a005d0f60b91b9ab
              name: 'Outgoing traffic on interface {#SNMPVALUE}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.31.1.1.1.10.{#SNMPINDEX}'
              key: 'ifHCOutOctets[{#SNMPVALUE}]'
              history: 7d
              trends: 60d
              units: bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: component
                  value: interface
          graph_prototypes:
            - uuid: 2e6365f3bd3c4f838c007f43cff15b29
              name: 'Interface {#SNMPVALUE}: Network traffic'
              graph_items:
                - color: 00CF00
                  item:
                    host: 'UserGateUTM by SNMP'
                    key: 'ifHCInOctets[{#SNMPVALUE}]'
                - sortorder: '1'
                  color: 002A97
                  item:
                    host: 'UserGateUTM by SNMP'
                    key: 'ifHCOutOctets[{#SNMPVALUE}]'
      tags:
        - tag: class
          value: network
        - tag: target
          value: usergate
        - tag: target
          value: usergate-utm
      macros:
        - macro: '{$CPU_USED_MAX}'
          value: '70'
          description: '%'
        - macro: '{$ICMP_LOSS_WARN}'
          value: '20'
          description: 'Warning threshold of ICMP packet loss in %.'
        - macro: '{$ICMP_RESPONSE_TIME_WARN}'
          value: '0.15'
          description: 'Warning threshold of the average ICMP response time in seconds.'
        - macro: '{$LOG_USED_MAX}'
          value: '80'
          description: '%'
        - macro: '{$MEM_LOAD_MAX}'
          value: '80'
          description: '%'
        - macro: '{$NET.IF.IFADMINSTATUS.MATCHES}'
          value: '^.*'
        - macro: '{$NET.IF.IFADMINSTATUS.NOT_MATCHES}'
          value: ^2$
        - macro: '{$SNMP.TIMEOUT}'
          value: 5m
          description: 'Time interval for the SNMP availability trigger.'
        - macro: '{$TRAPPEDTRIGGER_TTL}'
          value: 5m
          description: 'Время показа триггера.'
        - macro: '{$VCPU_USED_MAX}'
          value: '80'
          description: '%'
      valuemaps:
        - uuid: ee3cd64fb60a495f97f4c0307ce06974
          name: 'Service state'
          mappings:
            - value: '0'
              newvalue: Down
            - value: '1'
              newvalue: Up
        - uuid: 7f7ae15a2bd6446dbf52255cfb661997
          name: 'SNMP interface status (ifAdminStatus)'
          mappings:
            - value: '1'
              newvalue: up
            - value: '2'
              newvalue: down
            - value: '3'
              newvalue: testing
        - uuid: f925d387f5a644cc87e970d7cb76c21d
          name: 'SNMP interface status (ifOperStatus)'
          mappings:
            - value: '1'
              newvalue: up
            - value: '2'
              newvalue: down
            - value: '3'
              newvalue: testing
            - value: '4'
              newvalue: unknown
            - value: '5'
              newvalue: dormant
            - value: '6'
              newvalue: notPresent
            - value: '7'
              newvalue: lowerLayerDown
