              expression: 'nodata(/UserGateUTM by SNMP/snmptrap[.*trapTrafficDrop|.*45741\.2\.10\.1\.5\.1],{$TRAPPEDTRIGGER_TTL})=0'
              name: 'SNMPTrap: сработало правило DENY брандмауэра'
