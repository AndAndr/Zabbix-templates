zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 2bccf5ffb4a14c3e9c093a70e6f06300
      name: 'Templates/Network devices'
  templates:
    - uuid: 4d351e44e1af4bc1aa53e8329644e20e
      template: 'UserGateUTM by SNMP'
      name: 'UserGateUTM by SNMP'
      description: |
        https://github.com/AndAndr
        Шаблон для Usergate UTM с поддержкой трапов.
        Часть триггеров уровня инф. закрываются сами через 5 минут (см. макрос {$TRAPPEDTRIGGER_TTL}), остальные критичные - закрываются вручную, но не ранее значения этого макроса.
        Howto:
         Импортировать и прикрепить шаблон к хосту.
         Настроить устройство на отправку трапов, разрешить SNMP-запросы.
         Настроить отправку всех событий, кроме событий сработки правил МЭ.
      groups:
        - name: 'Templates/Network devices'
      items:
        - uuid: 31c131ebdb9e4d41bc0e6f0a6fb74a33
          name: 'CPU load percentage'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.45741.2.2.1.4.1.0
          key: cpuLoad
          history: 14d
          trends: 60d
          units: '%'
          description: 'Утилизация CPU'
          tags:
            - tag: component
              value: cpu
            - tag: component
              value: device
          triggers:
            - uuid: 74bef4569aab4a2aafe3a4af496af334
              expression: 'min(/UserGateUTM by SNMP/cpuLoad,5m)>{$CPU_USED_MAX}'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'max(/UserGateUTM by SNMP/cpuLoad,5m)<{$CPU_USED_MAX}-5'
              name: 'Слишком высокая загрузка ЦП'
              priority: AVERAGE
              tags:
                - tag: scope
                  value: performance
        - uuid: df06e030fe0a4f41860adfe21457914e
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          history: 1w
          valuemap:
            name: 'Service state'
          tags:
            - tag: component
              value: network
          triggers:
            - uuid: 8584214889cb4d79966fc5bc72fc2d8d
              expression: 'last(/UserGateUTM by SNMP/icmpping,#3)=0'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/UserGateUTM by SNMP/icmpping,#3)=1'
              name: 'Тест доступности по протоколу ICMP'
              priority: HIGH
              description: |
                Last value: {ITEM.LASTVALUE1}.
                Last three attempts returned timeout.  Please check device connectivity.
              tags:
                - tag: scope
                  value: availability
        - uuid: 7fdaf23b117d40e6b7bb6750d9d8dfb6
          name: 'ICMP loss'
          type: SIMPLE
          key: icmppingloss
          history: 1w
          value_type: FLOAT
          units: '%'
          tags:
            - tag: component
              value: network
          triggers:
            - uuid: 33e5280e3137460482376abecd7d7382
              expression: 'min(/UserGateUTM by SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/UserGateUTM by SNMP/icmppingloss,5m)<100'
              name: 'Высокая потеря пакетов ICMP ping'
              priority: WARNING
              dependencies:
                - name: 'Тест доступности по протоколу ICMP'
                  expression: 'last(/UserGateUTM by SNMP/icmpping,#3)=0'
                  recovery_expression: 'last(/UserGateUTM by SNMP/icmpping,#3)=1'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: e321a8eb29344020896faaa3bf51396c
          name: 'ICMP response time'
          type: SIMPLE
          key: icmppingsec
          history: 1w
          value_type: FLOAT
          units: s
          tags:
            - tag: component
              value: network
          triggers:
            - uuid: 4e528ad535fe4ef98ca420067be86b75
              expression: 'avg(/UserGateUTM by SNMP/icmppingsec,5m)>{$ICMP_RESPONSE_TIME_WARN}'
              name: 'Высокое время отклика ICMP ping'
              priority: WARNING
              dependencies:
                - name: 'Высокая потеря пакетов ICMP ping'
                  expression: 'min(/UserGateUTM by SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/UserGateUTM by SNMP/icmppingloss,5m)<100'
                - name: 'Тест доступности по протоколу ICMP'
                  expression: 'last(/UserGateUTM by SNMP/icmpping,#3)=0'
                  recovery_expression: 'last(/UserGateUTM by SNMP/icmpping,#3)=1'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: e44e42e005aa44de9e964dc2eb4c5308
          name: 'Used space on log disk percentage'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.45741.2.2.1.4.3.0
          key: logDiskSpace
          delay: 5m
          history: 14d
          trends: 60d
          units: '%'
          description: 'Утилизация раздела журналов'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          tags:
            - tag: component
              value: device
            - tag: component
              value: disk
          triggers:
            - uuid: 67b01d9ca19b448da64f8ca50f9133c7
              expression: 'last(/UserGateUTM by SNMP/logDiskSpace)>{$LOG_USED_MAX}'
              name: 'Проверьте заполненное пространство на лог-диске'
              priority: WARNING
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: capacity
        - uuid: 8f21a2d566a847788f0b416814cbfc4c
