zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 1d12408342854fd5a4436dd6d5d1bd4a
      name: Templates/Telephony
  templates:
    - uuid: c20c93e14b5c46cf9b1e8054a7848edd
      template: 'HP4k PBX by SNMP Traps'
      name: 'HP4k PBX by SNMP Traps'
      description: |
        https://github.com/AndAndr
        Мониторинг аварий АТС Siemens-Unify HiCom/HiPath/OpenScape при помощи обработки трапов SNMP. Необходима настройка требуемых алярмов со стороны АТС при помощи станционной админки.
      groups:
        - name: Templates/Telephony
      items:
        - uuid: 344d6842a600462692b8b5169f0ce634
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          valuemap:
            name: 'Service state'
          tags:
            - tag: component
              value: network
          triggers:
            - uuid: b0f6d453295f40938200ecae08e875ec
              expression: 'max(/HP4k PBX by SNMP Traps/icmpping,#3)=0'
              name: 'Тест доступности по протоколу ICMP'
              priority: HIGH
              description: 'Last three attempts returned timeout.  Please check device connectivity.'
              tags:
                - tag: scope
                  value: availability
        - uuid: 46ed3c7753e94e4993f42e2b058fac6c
          name: 'ICMP loss'
          type: SIMPLE
          key: icmppingloss
          value_type: FLOAT
          units: '%'
          tags:
            - tag: component
              value: network
          triggers:
            - uuid: d1c85484a63b4027ba2a9c40198f3a5a
              expression: 'min(/HP4k PBX by SNMP Traps/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/HP4k PBX by SNMP Traps/icmppingloss,5m)<100'
              name: 'Высокая потеря пакетов ICMP ping'
              opdata: 'Loss: {ITEM.LASTVALUE1}'
              priority: WARNING
              dependencies:
                - name: 'Тест доступности по протоколу ICMP'
                  expression: 'max(/HP4k PBX by SNMP Traps/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: 361dfece3a5141e2bb0d26fbaf628f53
          name: 'ICMP response time'
          type: SIMPLE
          key: icmppingsec
          value_type: FLOAT
          units: s
          tags:
            - tag: component
              value: network
          triggers:
            - uuid: c7ddffdf8ffa49e6b7d857f868c4e5a7
              expression: 'avg(/HP4k PBX by SNMP Traps/icmppingsec,5m)>{$ICMP_RESPONSE_TIME_WARN}'
              name: 'Высокое время отклика ICMP ping'
              opdata: 'Value: {ITEM.LASTVALUE1}'
              priority: WARNING
              dependencies:
                - name: 'Высокая потеря пакетов ICMP ping'
                  expression: 'min(/HP4k PBX by SNMP Traps/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/HP4k PBX by SNMP Traps/icmppingloss,5m)<100'
                - name: 'Тест доступности по протоколу ICMP'
                  expression: 'max(/HP4k PBX by SNMP Traps/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: 0729b6b508e04e56914c3c75cb95b679
          name: 'SNMP traps (fallback)'
          type: SNMP_TRAP
          key: snmptrap.fallback
          delay: '0'
          value_type: LOG
          trends: '0'
          description: 'The item is used to collect all SNMP traps unmatched by other snmptrap items'
          logtimefmt: 'hh:mm:sszyyyy/MM/dd'
          tags:
            - tag: component
              value: network
        - uuid: 24615694fa7647e9b326964c3c46d358
          name: 'HiCom alarm'
          type: SNMP_TRAP
          key: 'snmptrap[SIEMENS-PN-MIB::hicomAlStatus|231.7.2.1.2.2.1.2]'
          delay: '0'
          value_type: TEXT
          trends: '0'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var valueMap = {"1": "reset", "2": "set"};
                  var alarmstatus = "";
                  var alarmname = "";
                  var result = "Error";
                  alarmstatus = value.match(/SIEMENS-PN-MIB::hicomAlStatus.*value=INTEGER:\s(.*)|231\.7\.2\.1\.2\.2\.1\.2.*value=INTEGER:\s(.*)/i);
                  alarmname = value.match(/SIEMENS-PN-MIB::hicomAlName.*value=STRING:\s"(.*)"|231\.7\.2\.1\.2\.2\.1\.9.*value=STRING:\s"(.*)"/i);
                  if (alarmstatus == null || alarmname == null)
                  {
                    throw "Unable to parse SNMP trap";
                  }
                  if (alarmname[1] == null && alarmname[2] != null && alarmstatus[1] == null && alarmstatus[2] != null)
                  {
                    if (!isNaN(parseInt(alarmstatus[2])))
                    {
                      alarmstatus = valueMap[alarmstatus[2]];
                    }
                    result = 'AlarmName: ' + alarmname[2] + '; AlarmStatus: ' + alarmstatus;
                    return(result);
                  }
                  
                  if (alarmname[2] == null && alarmname[1] != null && alarmstatus[2] == null && alarmstatus[1] != null)
                  {
                    if (!isNaN(parseInt(alarmstatus[1])))
                    {
                      alarmstatus = valueMap[alarmstatus[1]];
                    }
                    result = 'AlarmName: ' + alarmname[1] + '; AlarmStatus: ' + alarmstatus;
                    return(result);
                  }
                  
          tags:
            - tag: component
              value: 'pbx alarms'
          triggers:
            - uuid: 15601a8aaf05451780f523b18a666f88
              expression: 'find(/HP4k PBX by SNMP Traps/snmptrap[SIEMENS-PN-MIB::hicomAlStatus|231.7.2.1.2.2.1.2],1m,"regexp","AlarmStatus:\\sset")=1'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'find(/HP4k PBX by SNMP Traps/snmptrap[SIEMENS-PN-MIB::hicomAlStatus|231.7.2.1.2.2.1.2],1m,"regexp","AlarmStatus:\\sreset")=1'
              correlation_mode: TAG_VALUE
              correlation_tag: alarmname
              name: 'SNMP trap: {{ITEM.VALUE}.regsub("AlarmName:\s(.*);","Авария \1")}'
              opdata: '{ITEM.VALUE}'
              priority: WARNING
              manual_close: 'YES'
              tags:
                - tag: alarmname
                  value: '{{ITEM.VALUE}.regsub("AlarmName:\s(.*);","\1")}'
                - tag: scope
                  value: availability
        - uuid: 5223bf455c7442ec855f1a6fe43d6c98
          name: 'System contact details'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.4.0
          key: 'system.contact[sysContact.0]'
          delay: 1h
          value_type: CHAR
          trends: '0'
          description: |
            MIB: SNMPv2-MIB
            The textual identification of the contact person for this managed node, together with information on how to contact this person.  If no contact information is known, the value is the zero-length string.
          inventory_link: CONTACT
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: 030eb9e09b80456aab1c3e1df2551d27
          name: 'System description'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.1.0
          key: 'system.descr[sysDescr.0]'
          delay: 1h
          value_type: CHAR
          trends: '0'
          description: |
            MIB: SNMPv2-MIB
            A textual description of the entity. This value should
            include the full name and version identification of the system's hardware type, software operating-system, and
            networking software.
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: da1f5b973377412bb9fe09f2a7b27490
          name: 'System location'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.6.0
          key: 'system.location[sysLocation.0]'
          delay: 1h
          value_type: CHAR
          trends: '0'
          description: |
            MIB: SNMPv2-MIB
            Physical location of the node (e.g., `equipment room`, `3rd floor`). If not provided, the value is a zero-length string.
          inventory_link: LOCATION
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: 74649701b4b544c2a129526e514bbf45
          name: 'System name'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.5.0
          key: system.name
          delay: 1h
          value_type: CHAR
          trends: '0'
          description: |
            MIB: SNMPv2-MIB
            An administratively-assigned name for this managed node.By convention, this is the node's fully-qualified domain name.  If the name is unknown, the value is the zero-length string.
          inventory_link: NAME
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
          tags:
            - tag: component
              value: system
        - uuid: ddaf457b0a9f4325a47ae3397843238a
          name: Uptime
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.3.0
          key: 'system.net.uptime[sysUpTime.0]'
          trends: '0'
          units: uptime
          description: |
            MIB: SNMPv2-MIB
            Time (in hundredths of a second) since the network management portion of the system was last re-initialized.
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
        - uuid: 5a3117726c6d4da2bd41731c1bf20818
          name: 'SNMP agent availability'
          type: INTERNAL
          key: 'zabbix[host,snmp,available]'
          delay: 5m
          description: |
            Availability of SNMP checks on the host. The value of this item corresponds to availability icons in the host list.
            Possible values:
            0 - not available
            1 - available
            2 - unknown
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: 595ae5e9939c425391d3e690556a9855
              expression: 'max(/HP4k PBX by SNMP Traps/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
              name: 'Нет сбора данных SNMP'
              opdata: 'Current state: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: 'SNMP недоступен для опроса. Пожалуйста, проверьте подключение устройства и настройки SNMP.'
              tags:
                - tag: scope
                  value: availability
      tags:
        - tag: class
          value: pbx
        - tag: target
          value: openscape
        - tag: target
          value: unify
      macros:
        - macro: '{$ICMP_LOSS_WARN}'
          value: '20'
          description: 'Warning threshold of ICMP packet loss in %.'
        - macro: '{$ICMP_RESPONSE_TIME_WARN}'
          value: '0.15'
          description: 'Warning threshold of the average ICMP response time in seconds.'
        - macro: '{$SNMP.TIMEOUT}'
          value: 5m
          description: 'Time interval for the SNMP availability trigger.'
      valuemaps:
        - uuid: 9508b27879874d14b8daf683dcde615a
          name: 'Service state'
          mappings:
            - value: '0'
              newvalue: Down
            - value: '1'
              newvalue: Up
