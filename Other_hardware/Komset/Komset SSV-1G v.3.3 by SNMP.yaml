zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 2cb435130e6a483a8b41678605abea1b
      name: 'Templates/Other Hardware'
  templates:
    - uuid: 569a65fdd2c7404fadc045e746d2834d
      template: 'Komset SSV-1G v.3.3 by SNMP'
      name: 'Komset SSV-1G v.3.3 by SNMP'
      description: |
        https://github.com/AndAndr
        Мониторинг по SNMP сервера точного времени Комсет ССВ-1Г:
        1. Состояния БП.
        2. Статус устройства.
        3. Статус аварии.
        4. Состояния модулей ГНСС.
      groups:
        - name: 'Templates/Other Hardware'
      items:
        - uuid: 2274e71e4645455aa1a5b5bbb54173a1
          name: 'Alarm status'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7999.30.1.5.0]'
          key: devAlarmStatus
          trends: '0'
          valuemap:
            name: AlarmStatus
          tags:
            - tag: component
              value: alert
          triggers:
            - uuid: c04b2c0fd67e4106857f6c35eef87745
              expression: 'last(/Komset SSV-1G v.3.3 by SNMP/devAlarmStatus,#5)=7'
              name: 'Alert alarm'
              priority: HIGH
            - uuid: 93391ce44a2447638ed763d9d6dc5bc9
              expression: 'last(/Komset SSV-1G v.3.3 by SNMP/devAlarmStatus,#5)=6'
              name: 'Critical alarm'
              priority: AVERAGE
            - uuid: ef8ca886ab654e848d893765702d420b
              expression: 'last(/Komset SSV-1G v.3.3 by SNMP/devAlarmStatus,#5)=8'
              name: 'Emergency alarm'
              priority: HIGH
            - uuid: 3ecf981788f64990b75ee83b41a7cdcf
              expression: 'last(/Komset SSV-1G v.3.3 by SNMP/devAlarmStatus,#5)=5'
              name: 'Error alarm'
              priority: WARNING
            - uuid: ef3e8461e24d46ce967f2ce669543fa4
              expression: 'last(/Komset SSV-1G v.3.3 by SNMP/devAlarmStatus,#5)=3'
              name: 'Notice alarm'
              priority: INFO
            - uuid: 541c76e7e53644cb813f5a9311d53eb4
              expression: 'last(/Komset SSV-1G v.3.3 by SNMP/devAlarmStatus,#5)=0'
              name: 'Unknown alarm'
              priority: WARNING
            - uuid: 77f171a3b4a64a5794acd82dc0924882
              expression: 'last(/Komset SSV-1G v.3.3 by SNMP/devAlarmStatus,#5)=4'
              name: 'Warning alarm'
              priority: AVERAGE
        - uuid: 416a222c9ef448d5bf0f820117e3a7bd
          name: 'Device status'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7999.30.1.6.0]'
          key: devDeviceStatus
          trends: '0'
          valuemap:
            name: DeviceStatus
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: c83c57f3feef4a4da37ccaf8d0d94f40
              expression: 'last(/Komset SSV-1G v.3.3 by SNMP/devDeviceStatus,#5)=6'
              name: 'Clock not sync'
              priority: HIGH
            - uuid: 028be9791d5f4df5baae5639fa72bcfe
              expression: 'last(/Komset SSV-1G v.3.3 by SNMP/devDeviceStatus,#5)=2'
              name: 'No sync source'
              priority: HIGH
            - uuid: c782b4a3eb074f87a32d9348dee550cc
              expression: 'last(/Komset SSV-1G v.3.3 by SNMP/devDeviceStatus,#5)=4'
              name: 'No time source'
              priority: HIGH
            - uuid: 5d9609e906564db3b3fb6b7c712cf339
              expression: 'last(/Komset SSV-1G v.3.3 by SNMP/devDeviceStatus,#5)=3'
              name: 'Sync source not valid'
              priority: HIGH
            - uuid: 3f98280dce254387b04e887d1084770a
              expression: 'last(/Komset SSV-1G v.3.3 by SNMP/devDeviceStatus,#5)=5'
              name: 'Time source not valid'
              priority: HIGH
            - uuid: efd2856cfe4949b59d16158393fd3798
              expression: 'last(/Komset SSV-1G v.3.3 by SNMP/devDeviceStatus,#5)=0'
              name: 'Unknown device status'
              priority: HIGH
        - uuid: 26b22203437047f081c808e18452f53b
          name: 'Hardware version'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7999.30.1.2.0]'
          key: devHwVersion
          delay: 1h
          value_type: TEXT
          trends: '0'
          description: 'Hardware version'
          inventory_link: HARDWARE
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: system
        - uuid: 01374bcd0d724082adaa84acb9eaa569
          name: 'Synchronization Status Message'
          type: SNMP_AGENT
          snmp_oid: 'get[iso.3.6.1.4.1.7999.30.1.11.2.0]'
          key: devOscSSM
          valuemap:
            name: OscStatus
          tags:
            - tag: component
              value: system
        - uuid: e0d1e85b117e49ed9faff7d4519146b7
          name: 'Internal oscillator status'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7999.30.1.11.1.0]'
          key: devOscStatus
          valuemap:
            name: OscStatus
          tags:
            - tag: component
              value: system
        - uuid: 58ce5b42fae8435bae42afa75e018b2e
          name: 'Power supply 1 status'
          type: SNMP_AGENT
          snmp_oid: 'get[iso.3.6.1.4.1.7999.30.1.7.1.0]'
          key: devPowerStatus1
          valuemap:
            name: devPowerStatus
          tags:
            - tag: component
              value: power
          triggers:
            - uuid: c3b56051d54a4e449c5d9f662493bbae
              expression: 'last(/Komset SSV-1G v.3.3 by SNMP/devPowerStatus1)<>5'
              name: 'Check PS1'
              opdata: 'Current state: {ITEM.LASTVALUE1}'
              priority: WARNING
        - uuid: 2da09399479844f2929143456939c6bc
          name: 'Power supply 2 status'
          type: SNMP_AGENT
          snmp_oid: 'get[iso.3.6.1.4.1.7999.30.1.7.2.0]'
          key: devPowerStatus2
          valuemap:
            name: devPowerStatus
          tags:
            - tag: component
              value: power
          triggers:
            - uuid: 434a837c69ba42d8a43a679bc7621e19
              expression: 'last(/Komset SSV-1G v.3.3 by SNMP/devPowerStatus2)<>5'
              name: 'Check PS2'
              opdata: 'Current state: {ITEM.LASTVALUE1}'
              priority: WARNING
        - uuid: f3ca883c5a5941a6af0235555ce38bfe
          name: 'Serial number'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7999.30.1.4.0]'
          key: devSerialNumber
          delay: 1h
          value_type: TEXT
          trends: '0'
          description: 'Serial number'
          inventory_link: SERIALNO_A
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: system
        - uuid: 92109f902ec849aa92bc619716942702
          name: 'Software version'
          type: SNMP_AGENT
          snmp_oid: 'get[iso.3.6.1.4.1.7999.30.1.3.0]'
          key: devSwVersion
          delay: 1h
          value_type: TEXT
          trends: '0'
          description: 'Software version'
          inventory_link: SOFTWARE
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: system
        - uuid: 1e756446ddeb453a9b8cd420b5bec892
          name: 'Leap second TimeScalePopravka'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7999.30.1.10.2.0]'
          key: devTimeScalePopravka
          tags:
            - tag: component
              value: ntp
        - uuid: 338f04787a854650adc908b19206c596
          name: 'Leap second status'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7999.30.1.10.1.0]'
          key: devTimeScaleStatus
          delay: 10m
          valuemap:
            name: TimeScaleStatus
          tags:
            - tag: component
              value: ntp
          triggers:
            - uuid: ec5f72e709644eb4a837023ceb2b836e
              expression: 'last(/Komset SSV-1G v.3.3 by SNMP/devTimeScaleStatus)=3'
              name: 'Leap status - Delete second'
              priority: INFO
            - uuid: 7f81577e9f2042f9a822b00492d5fb76
              expression: 'last(/Komset SSV-1G v.3.3 by SNMP/devTimeScaleStatus)=2'
              name: 'Leap status - Insert second'
              priority: INFO
            - uuid: b8d79a9a2dd447ada31faf8e9d3b815f
              expression: 'last(/Komset SSV-1G v.3.3 by SNMP/devTimeScaleStatus)=4'
              name: 'Leap status - Not synchronised'
              priority: WARNING
        - uuid: 2a23a7bb49cc46eb9ee76ea9f5a81113
          name: 'Device TimeZone'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7999.30.1.10.3.0]'
          key: devTimeZone
          delay: 1h
          units: час.
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  return value/=3600;
                  
                  
                  
          tags:
            - tag: component
              value: system
        - uuid: 627c2bf1e13249e8bdfe683e75816da8
          name: 'moduleExt{$MGNSS.EXT.MODULE.LOCATION} Alarm Status'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7999.30.200.1.{$MGNSS.EXT.MODULE.LOCATION}.6.0]'
          key: moduleExtAlarmStatus
          valuemap:
            name: AlarmStatus
          tags:
            - tag: component
              value: gnss
        - uuid: 33f1da49769b46e1bb84fbfc8beee3b0
          name: 'moduleExt{$MGNSS.EXT.MODULE.LOCATION} BEIDOU navigation satellites count'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7999.30.200.1.{$MGNSS.EXT.MODULE.LOCATION}.10.6.0]'
          key: moduleExtGnssNavSatBeidou
          tags:
            - tag: component
              value: gnss
        - uuid: 0780a7261f6e44c5806210641f5b4426
          name: 'moduleExt{$MGNSS.EXT.MODULE.LOCATION} GALILEO navigation satellites count'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7999.30.200.1.{$MGNSS.EXT.MODULE.LOCATION}.10.5.0]'
          key: moduleExtGnssNavSatGalileo
          tags:
            - tag: component
              value: gnss
        - uuid: d3c8e7f1092f4d0cbfe8934c4502eafb
          name: 'moduleExt{$MGNSS.EXT.MODULE.LOCATION} GLONASS navigation satellites count'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7999.30.200.1.{$MGNSS.EXT.MODULE.LOCATION}.10.3.0]'
          key: moduleExtGnssNavSatGlonass
          tags:
            - tag: component
              value: gnss
        - uuid: 6c03514cdd8e4686af8e77ea017b3ac4
          name: 'moduleExt{$MGNSS.EXT.MODULE.LOCATION} GPS navigation satellites count'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7999.30.200.1.{$MGNSS.EXT.MODULE.LOCATION}.10.4.0]'
          key: moduleExtGnssNavSatGPS
          tags:
            - tag: component
              value: gnss
        - uuid: 4bc53b6239784396be56fd771a63f378
          name: 'moduleExt{$MGNSS.EXT.MODULE.LOCATION} GNSS Status'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7999.30.200.1.{$MGNSS.EXT.MODULE.LOCATION}.10.1.0]'
          key: moduleExtGnssStatus
          valuemap:
            name: GnssStatus
          tags:
            - tag: component
              value: gnss
          triggers:
            - uuid: 35247363e28e4f52859d1492fdc67692
              expression: 'last(/Komset SSV-1G v.3.3 by SNMP/moduleExtGnssStatus)<>2'
              name: 'Состояние внешнего модуля ГНСС не Норма'
              opdata: 'Current state: {ITEM.LASTVALUE1}'
              priority: INFO
        - uuid: cc4f0e97ffaa431d8bb448548af9772d
          name: 'moduleInt1 Alarm Status'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7999.30.200.2.9.6.0]'
          key: moduleInt1AlarmStatus
          valuemap:
            name: AlarmStatus
          tags:
            - tag: component
              value: gnss
        - uuid: 42f55954749b439d826da5a6df0c1a6f
          name: 'moduleInt1 BEIDOU navigation satellites count'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7999.30.200.2.9.10.6.0]'
          key: moduleInt1GnssNavSatBeidou
          tags:
            - tag: component
              value: gnss
        - uuid: 0d46ee7e58304cd09953f9862ae9add0
          name: 'moduleInt1 GALILEO navigation satellites count'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7999.30.200.2.9.10.5.0]'
          key: moduleInt1GnssNavSatGalileo
          tags:
            - tag: component
              value: gnss
        - uuid: 0cd4ba7b518b4174a70a7aebd5d0d6af
          name: 'moduleInt1 GLONASS navigation satellites count'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7999.30.200.2.9.10.3.0]'
          key: moduleInt1GnssNavSatGlonass
          tags:
            - tag: component
              value: gnss
        - uuid: 08ee96adb03e4c09bafb2ad565ca21ee
          name: 'moduleInt1 GPS navigation satellites count'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7999.30.200.2.9.10.4.0]'
          key: moduleInt1GnssNavSatGPS
          tags:
            - tag: component
              value: gnss
        - uuid: 92f4438fe045493da4fea6ea7e6a2577
          name: 'moduleInt1 GNSS navigation satellites count summary'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7999.30.200.2.9.10.2.0]'
          key: moduleInt1GnssNavSatSummary
          tags:
            - tag: component
              value: gnss
        - uuid: d1e4bb3cbb8a47e2b86eb8e340178fac
          name: 'moduleInt1 GNSS Status'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7999.30.200.2.9.10.1.0]'
          key: moduleInt1GnssStatus
          valuemap:
            name: GnssStatus
          tags:
            - tag: component
              value: gnss
          triggers:
            - uuid: 437b51114d62485da3e204e9537e2184
              expression: 'last(/Komset SSV-1G v.3.3 by SNMP/moduleInt1GnssStatus)<>2'
              name: 'Состояние встроенного модуля ГНСС не Норма'
              opdata: 'Current state: {ITEM.LASTVALUE1}'
              priority: INFO
        - uuid: e7f59fd9b1244a4fad20979742d8a260
          name: 'SNMP traps (fallback)'
          type: SNMP_TRAP
          key: snmptrap.fallback
          delay: '0'
          value_type: LOG
          trends: '0'
          description: 'The item is used to collect all SNMP traps unmatched by other snmptrap items'
          logtimefmt: 'hh:mm:sszyyyy/MM/dd'
          tags:
            - tag: component
              value: network
        - uuid: 3232e9a2fd9049b783c2d786304c97ba
          name: 'System contact details'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.4.0
          key: 'system.contact[sysContact.0]'
          delay: 1h
          value_type: CHAR
          trends: '0'
          description: |
            MIB: SNMPv2-MIB
            The textual identification of the contact person for this managed node, together with information on how to contact this person.  If no contact information is known, the value is the zero-length string.
          inventory_link: CONTACT
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: d0f9ef30ce654ddebab483a9bfadc8cf
          name: 'System description'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.1.0
          key: 'system.descr[sysDescr.0]'
          delay: 1h
          value_type: CHAR
          trends: '0'
          description: |
            MIB: SNMPv2-MIB
            A textual description of the entity. This value should
            include the full name and version identification of the system's hardware type, software operating-system, and
            networking software.
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: e656140176c4451f8c8afd1a8cd829c7
          name: 'System location'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.6.0
          key: 'system.location[sysLocation.0]'
          delay: 1h
          value_type: CHAR
          trends: '0'
          description: |
            MIB: SNMPv2-MIB
            Physical location of the node (e.g., `equipment room`, `3rd floor`). If not provided, the value is a zero-length string.
          inventory_link: LOCATION
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: 77ad618ab9bb42deb141ed1136fe9730
          name: 'System name'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.5.0
          key: system.name
          delay: 1h
          value_type: CHAR
          trends: '0'
          description: |
            MIB: SNMPv2-MIB
            An administratively-assigned name for this managed node.By convention, this is the node's fully-qualified domain name.  If the name is unknown, the value is the zero-length string.
          inventory_link: NAME
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: a19079d3285345f7b5d0bcff600d0771
              expression: 'last(/Komset SSV-1G v.3.3 by SNMP/system.name,#1)<>last(/Komset SSV-1G v.3.3 by SNMP/system.name,#2) and length(last(/Komset SSV-1G v.3.3 by SNMP/system.name))>0'
              name: 'System name has changed'
              event_name: 'System name has changed (new name: {ITEM.VALUE})'
              priority: INFO
              description: 'The name of the system has changed. Acknowledge to close the problem manually.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
                - tag: scope
                  value: security
        - uuid: ce498dbe641d4645a69e3278e4779aee
          name: Uptime
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.3.0
          key: 'system.net.uptime[sysUpTime.0]'
          trends: '0'
          units: uptime
          description: |
            MIB: SNMPv2-MIB
            Time (in hundredths of a second) since the network management portion of the system was last re-initialized.
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
        - uuid: 5eb4d5d2582549108517a0669c59cbd7
          name: 'System object ID'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.2.0
          key: 'system.objectid[sysObjectID.0]'
          delay: 1h
          value_type: CHAR
          trends: '0'
          description: |
            MIB: SNMPv2-MIB
            The vendor's authoritative identification of the network management subsystem contained in the entity.  This value is allocated within the SMI enterprises subtree (1.3.6.1.4.1) and provides an easy and unambiguous means for determining`what kind of box' is being managed.  For example, if vendor`Flintstones, Inc.' was assigned the subtree1.3.6.1.4.1.4242, it could assign the identifier 1.3.6.1.4.1.4242.1.1 to its `Fred Router'.
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: bab9527ed8ba48de945d154055476950
          name: 'SNMP agent availability'
          type: INTERNAL
          key: 'zabbix[host,snmp,available]'
          delay: 5m
          description: |
            Availability of SNMP checks on the host. The value of this item corresponds to availability icons in the host list.
            Possible values:
            0 - not available
            1 - available
            2 - unknown
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: 5eaf317c5a884264a880e264b8955b0e
              expression: 'max(/Komset SSV-1G v.3.3 by SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
              name: 'No SNMP data collection'
              opdata: 'Current state: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: 'SNMP is not available for polling. Please check device connectivity and SNMP settings.'
              tags:
                - tag: scope
                  value: availability
      tags:
        - tag: class
          value: gnss
        - tag: target
          value: komset
        - tag: target
          value: ssv-1g
      macros:
        - macro: '{$MGNSS.EXT.MODULE.LOCATION}'
          value: '2'
          description: 'Расположение внешнего модуля mGNSS'
        - macro: '{$SNMP.TIMEOUT}'
          value: 5m
      dashboards:
        - uuid: 34068df8e74b4c588a1e443abd065f8a
          name: ССВ-1Г
          pages:
            - widgets:
                - type: graph
                  width: '36'
                  height: '5'
                  fields:
                    - type: GRAPH
                      name: graphid.0
                      value:
                        host: 'Komset SSV-1G v.3.3 by SNMP'
                        name: 'Статистика НКА - встроенный модуль'
                    - type: STRING
                      name: reference
                      value: XZJXW
                - type: item
                  name: 'Блок питания'
                  'y': '5'
                  width: '6'
                  fields:
                    - type: STRING
                      name: bg_color
                      value: B2EBF2
                    - type: STRING
                      name: description
                      value: БП1
                    - type: INTEGER
                      name: desc_size
                      value: '30'
                    - type: INTEGER
                      name: desc_v_pos
                      value: '1'
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'Komset SSV-1G v.3.3 by SNMP'
                        key: devPowerStatus1
                    - type: INTEGER
                      name: show.0
                      value: '1'
                    - type: STRING
                      name: thresholds.0.color
