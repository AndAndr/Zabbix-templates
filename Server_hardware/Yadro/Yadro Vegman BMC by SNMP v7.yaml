zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: e960332b3f6c46a1956486d4f3f99fce
      name: 'Templates/Server hardware'
  templates:
    - uuid: d12a48312d6e4dcab3fb255439bbe751
      template: 'Yadro Vegman BMC by SNMP export'
      name: 'Yadro Vegman BMC by SNMP export'
      description: 'Шаблон для серверов Yadro Vegman. Основан на шаблоне Yadro vegman v1.10. Работает в режиме опроса и + ловли трапов SNMP.'
      groups:
        - name: 'Templates/Server hardware'
      items:
        - uuid: 58a5a374cf984022afbfbfd2ee092e1b
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          history: 1w
          valuemap:
            name: 'Service state'
          tags:
            - tag: component
              value: network
          triggers:
            - uuid: dcf17a3e28504a18b4d2504b6159ab86
              expression: 'last(/Yadro Vegman BMC by SNMP export/icmpping,#3)=0'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/Yadro Vegman BMC by SNMP export/icmpping,#3)=1'
              name: 'Тест доступности по протоколу ICMP'
              priority: HIGH
              description: |
                Последнее значение: {ITEM.LASTVALUE1}.
                Последние три попытки вернули timeout. Проверьте подключение устройства.
              tags:
                - tag: scope
                  value: availability
        - uuid: a285d6add12944f3a9eaaa6f904ffc04
          name: 'ICMP loss'
          type: SIMPLE
          key: icmppingloss
          history: 1w
          value_type: FLOAT
          units: '%'
          tags:
            - tag: component
              value: network
          triggers:
            - uuid: 52116091cc3f4d86bc98fc77a365ecf7
              expression: 'min(/Yadro Vegman BMC by SNMP export/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/Yadro Vegman BMC by SNMP export/icmppingloss,5m)<100'
              name: 'Высокая потеря пакетов ICMP ping'
              priority: WARNING
              dependencies:
                - name: 'Тест доступности по протоколу ICMP'
                  expression: 'last(/Yadro Vegman BMC by SNMP export/icmpping,#3)=0'
                  recovery_expression: 'last(/Yadro Vegman BMC by SNMP export/icmpping,#3)=1'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: 80f3ef6bd89346068f0c0650112921fe
          name: 'ICMP response time'
          type: SIMPLE
          key: icmppingsec
          history: 1w
          value_type: FLOAT
          units: s
          tags:
            - tag: component
              value: network
          triggers:
            - uuid: 53197f7830bd4b299d6445a7db5840ad
              expression: 'avg(/Yadro Vegman BMC by SNMP export/icmppingsec,5m)>{$ICMP_RESPONSE_TIME_WARN}'
              name: 'Высокое время отклика ICMP ping'
              priority: WARNING
              dependencies:
                - name: 'Высокая потеря пакетов ICMP ping'
                  expression: 'min(/Yadro Vegman BMC by SNMP export/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/Yadro Vegman BMC by SNMP export/icmppingloss,5m)<100'
                - name: 'Тест доступности по протоколу ICMP'
                  expression: 'last(/Yadro Vegman BMC by SNMP export/icmpping,#3)=0'
                  recovery_expression: 'last(/Yadro Vegman BMC by SNMP export/icmpping,#3)=1'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: abaae064e8ed4f789cdf20ba23d13a4f
          name: 'SNMP traps (fallback)'
          type: SNMP_TRAP
          key: snmptrap.fallback
          delay: '0'
          value_type: LOG
          trends: '0'
          description: 'The item is used to collect all SNMP traps unmatched by other snmptrap items'
          logtimefmt: 'hh:mm:sszyyyy/MM/dd'
          tags:
            - tag: component
              value: network
        - uuid: 8471a11b1cba4a9fa12b4bf2ddf520fe
          name: 'SNMP trap: yadroCurrSensorStateNotification'
          type: SNMP_TRAP
          key: 'snmptrap["(.*yadroCurrSensorStateNotification|.*49769.0.5[\s|$])"]'
          delay: '0'
          history: 90d
          value_type: CHAR
          trends: '0'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var valueMap = {"0": "disabled", "1": "normal", "2": "warningLow", "3":"warningHigh", "4":"criticalLow", "5":"criticalHigh"};
                  var result = value.match(/(?:.*yadroCurrSensorState.\"*(\w+)\"*|.*49769\.1\.5\.1\.7\.([\d\.]+))(?:\s+type=\d+\s+value=\w+:\s+|\s=\s\w+:\s|\s=\s|:)(\w+)/i);
                  if (result == null) 
                  {
                    throw "Unable to parse the SNMP trap:\n\n" + value;
                  }
                  var sensorName = "";
                  var sensorState = "";
                  if (result[1] != null) 
                  {
                    sensorName = result[1];
                  }
                  if (result[2] != null) 
                  {
                    var asciiString = "";
                    var asciiCodeArray = result[2].split('.');
                    for (var i = 0; i < asciiCodeArray.length; i++) {
                      if (asciiCodeArray[i] > 32) {
                        asciiString += String.fromCharCode(asciiCodeArray[i]);
                      }
                    }
                    sensorName = asciiString;
                  }
                  if (!isNaN(parseInt(result[3]))) 
                  {
                    sensorState = valueMap[result[3]];
                  }
                  else 
                  {
                    sensorState = result[3];
                  }
                  return "Sensor: " + sensorName + "; State: " + sensorState + ";";
                  
          tags:
            - tag: component
              value: snmptrap
          triggers:
            - uuid: 7af066f5d7e74ea98d3c23c0e079ec93
              expression: 'find(/Yadro Vegman BMC by SNMP export/snmptrap["(.*yadroCurrSensorStateNotification|.*49769.0.5[\s|$])"],,"regexp","State: criticalHigh;")=1'
              correlation_mode: TAG_VALUE
              correlation_tag: Sensor
              name: 'SNMP trap: {{ITEM.VALUE}.regsub("Sensor: (.*?); State: (.*?);", "Датчик тока \1 достиг верхнего критического значения")}'
              opdata: '{ITEM.VALUE}'
              priority: HIGH
              type: MULTIPLE
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: availability
                - tag: Sensor
                  value: '{{ITEM.VALUE}.regsub("Sensor: (.*?); State: (.*?);", "\1")}'
                - tag: snmpTrap
            - uuid: 7eaf2f3469174fac950136f845db168d
              expression: 'find(/Yadro Vegman BMC by SNMP export/snmptrap["(.*yadroCurrSensorStateNotification|.*49769.0.5[\s|$])"],,"regexp","State: warningHigh;")=1'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'find(/Yadro Vegman BMC by SNMP export/snmptrap["(.*yadroCurrSensorStateNotification|.*49769.0.5[\s|$])"],,"regexp","State: warningHigh;")=0'
              correlation_mode: TAG_VALUE
              correlation_tag: Sensor
              name: 'SNMP trap: {{ITEM.VALUE}.regsub("Sensor: (.*?); State: (.*?);", "Датчик тока \1 достиг верхнего предупредительного значения")}'
              opdata: '{ITEM.VALUE}'
              priority: WARNING
              type: MULTIPLE
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: availability
                - tag: Sensor
                  value: '{{ITEM.VALUE}.regsub("Sensor: (.*?); State: (.*?);", "\1")}'
                - tag: snmpTrap
            - uuid: c5082146e8ed450b8c76d94f4bd77bd2
              expression: 'find(/Yadro Vegman BMC by SNMP export/snmptrap["(.*yadroCurrSensorStateNotification|.*49769.0.5[\s|$])"],,"regexp","State: criticalLow;")=1'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'find(/Yadro Vegman BMC by SNMP export/snmptrap["(.*yadroCurrSensorStateNotification|.*49769.0.5[\s|$])"],,"regexp","State: criticalLow;")=0'
              correlation_mode: TAG_VALUE
