              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'find(/Yadro Vegman BMC by SNMP export/snmptrap["(.*yadroInventoryItemNotification|.*49769.0.7[\s|$])"],,"regexp","IsPresent: true; IsFunctional: false;")=0'
              correlation_mode: TAG_VALUE
              correlation_tag: Path
              name: 'SNMP trap: {{ITEM.VALUE}.regsub("Path: (.*?);", "Устройство \1 не работает")}'
              opdata: '{ITEM.VALUE}'
              priority: HIGH
              description: '{{ITEM.VALUE}.regsub("Path: (.*?);", "Устройство \1 найдено, но не функционирует")}'
              type: MULTIPLE
              manual_close: 'YES'
              tags:
                - tag: Path
                  value: '{{ITEM.VALUE}.regsub("Path: (.*?);", "\1")}'
                - tag: scope
                  value: availability
                - tag: snmpTrap
            - uuid: 00d7d62cfab643bf8c0267e51ae3d8b7
              expression: 'find(/Yadro Vegman BMC by SNMP export/snmptrap["(.*yadroInventoryItemNotification|.*49769.0.7[\s|$])"],,"regexp","IsPresent: false;")=1'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'find(/Yadro Vegman BMC by SNMP export/snmptrap["(.*yadroInventoryItemNotification|.*49769.0.7[\s|$])"],,"regexp","IsPresent: false;")=0'
              correlation_mode: TAG_VALUE
              correlation_tag: Path
              name: 'SNMP trap: {{ITEM.VALUE}.regsub("Path: (.*?); IsPresent: (.*?);", "Устройство \1 отсутствует")}'
              opdata: '{ITEM.VALUE}'
              status: DISABLED
              priority: INFO
              description: '{{ITEM.VALUE}.regsub("Path: (.*?); IsPresent: (.*?);", "Устройство \1 отсутствует")} Возможно, оно было удалено. Пожалуйста, закройте триггер вручную, если устройство не было возвращено.'
              type: MULTIPLE
