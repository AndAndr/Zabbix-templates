        - uuid: bbe147c151d247cfa30a6b8b1475c801
          name: 'SNMP trap: yadroTachSensorStateNotification'
          type: SNMP_TRAP
          key: 'snmptrap["(.*yadroTachSensorStateNotification|.*49769.0.4[\s|$])"]'
          delay: '0'
          history: 90d
          value_type: CHAR
          trends: '0'
          preprocessing:
            - type: JAVASCRIPT
