              dependencies:
                - name: 'Сервер выключен'
                  expression: 'last(/Yadro Vegman BMC by SNMP export/vegman.server.Host.Power.State)=0 and change(/Yadro Vegman BMC by SNMP export/vegman.server.Host.Power.State)<0'
