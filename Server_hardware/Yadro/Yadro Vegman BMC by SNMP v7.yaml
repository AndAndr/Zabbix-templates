                - tag: snmpTrap
        - uuid: 945d1751970345fda0e0e77aa8c76227
          name: 'SNMP trap: yadroHostPowerStateNotification'
          type: SNMP_TRAP
          key: 'snmptrap["(.*yadroHostPowerStateNotification|.*49769.0.1[\s|$])"]'
          delay: '0'
          history: 90d
          value_type: CHAR
          trends: '0'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var valueMap = {"-1": "unknown", "0": "off", "1": "on"};
                  var result = value.match(/(?:.*yadroHostPowerState|.*49769.1.1)(?:\s+type=\d+\s+value=\w+:\s+|\s=\s\w+:\s|\s=\s|:)(\-*\w+)/i);
                  if (result == null) 
                  {
                    throw "Unable to parse the SNMP trap:\n\n" + value;
                  }
                  if (!isNaN(parseInt(result[1]))) 
                  {
                    return valueMap[result[1]];
                  }
                  
                  return result[1];
          tags:
            - tag: component
              value: snmptrap
          triggers:
            - uuid: f6995ba3419044e7bcb3ba10a29e8e5a
              expression: 'find(/Yadro Vegman BMC by SNMP export/snmptrap["(.*yadroHostPowerStateNotification|.*49769.0.1[\s|$])"],,"regexp","off")=1'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'find(/Yadro Vegman BMC by SNMP export/snmptrap["(.*yadroHostPowerStateNotification|.*49769.0.1[\s|$])"],,"regexp","off")=0'
              name: 'SNMP-trap: питание хоста отключено'
              opdata: '{ITEM.VALUE}'
              status: DISABLED
              priority: HIGH
              manual_close: 'YES'
              dependencies:
                - name: 'Сервер выключен'
                  expression: 'last(/Yadro Vegman BMC by SNMP export/vegman.server.Host.Power.State)=0 and change(/Yadro Vegman BMC by SNMP export/vegman.server.Host.Power.State)<0'
                  recovery_expression: 'last(/Yadro Vegman BMC by SNMP export/vegman.server.Host.Power.State)=1'
              tags:
                - tag: snmpTrap
            - uuid: ebb12e98aa13470ea0d47ee5f187c5b3
              expression: 'find(/Yadro Vegman BMC by SNMP export/snmptrap["(.*yadroHostPowerStateNotification|.*49769.0.1[\s|$])"],,"regexp","unknown")=1'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'find(/Yadro Vegman BMC by SNMP export/snmptrap["(.*yadroHostPowerStateNotification|.*49769.0.1[\s|$])"],,"regexp","unknown")=0'
              name: 'SNMP-trap: состояние питания хоста неизвестно'
              opdata: '{ITEM.VALUE}'
              priority: WARNING
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: availability
                - tag: snmpTrap
        - uuid: 6f8b29e1eb2045eb905225ab0524bf4f
          name: 'SNMP trap: yadroInventoryItemNotification'
