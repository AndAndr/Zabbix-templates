              name: 'SNMP trap: {{ITEM.VALUE}.regsub("Sensor: (.*?); State: (.*?);", "Датчик тока \1 достиг нижнего критического значения")}'
              opdata: '{ITEM.VALUE}'
              priority: HIGH
              type: MULTIPLE
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: availability
                - tag: Sensor
                  value: '{{ITEM.VALUE}.regsub("Sensor: (.*?); State: (.*?);", "\1")}'
                - tag: snmpTrap
            - uuid: 38cc4d66aadb41de95966f649ab9eab4
