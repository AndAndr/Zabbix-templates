                  //value = "  YADRO-MIB::yadroInventoryPresent.\"system/chassis/motherboard/cpu1\" type=2  value=INTEGER: 1 \nYADRO-MIB::yadroInventoryFunctional.\"system/chassis/motherboard/cpu1\" type=2  value=INTEGER: 2";
                  var valueMap = {"1": "true", "2": "false"};
                  var result = value.match(/(?:.*yadroInventoryPresent.\"*([\/\w]+)\"*|.*49769\.4\.1\.9\.([\d\.]+))(?:\s+type=\d+\s+value=\w+:\s+|\s=\s\w+:\s|\s=\s|:)(\w+)(?:\s+|\s*\n)(?:.*yadroInventoryFunctional.\"*([\/\w]+)\"*|.*49769\.4\.1\.10\.([\d\.]+))(?:\s+type=\d+\s+value=\w+:\s+|\s=\s\w+:\s|\s=\s|:)(\w+)/i);
                  if (result == null) 
                  {
                    throw "Unable to parse the SNMP trap:\n\n" + value;
                  }
                  var inventoryPath = "";
                  var isPresent = "";
                  var isFunctional = "";
                  if (result[1] != null) 
                  {
                    inventoryPath = result[1];
                  }
                  if (result[2] != null) 
                  {
                    var asciiString = "";
                    var asciiCodeArray = result[2].split('.');
                    for (var i = 0; i < asciiCodeArray.length; i++) {
                      if (asciiCodeArray[i] > 32) {
                        asciiString += String.fromCharCode(asciiCodeArray[i]);
                      }
                    }
                    inventoryPath = asciiString;
                  }
                  
                  if (!isNaN(parseInt(result[3]))) 
                  {
                    isPresent = valueMap[result[3]];
                  }
                  else 
                  {
                    isPresent = result[3];
                  }
                  if (!isNaN(parseInt(result[6]))) 
                  {
                    isFunctional = valueMap[result[6]];
                  }
                  else 
                  {
                    isFunctional = result[6];
                  }
                  return "Path: " + inventoryPath + "; IsPresent: " + isPresent + "; IsFunctional: " + isFunctional + ";";
                  
                  
          tags:
            - tag: component
              value: snmptrap
          triggers:
            - uuid: 3ec770af8b7d4fa6b26155de09ad2b56
